services:
  client:
    build: ./client
    ports:
      - "3000:80"
    depends_on:
      - server
    env_file:
      - ./client/.env
    restart: unless-stopped

  server:
    build: ./server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
    depends_on:
      - postgres
    command: >
      sh -c "
        npx prisma@6.19.0 migrate deploy &&
        npm run start
      "
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: fullstack070426
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: